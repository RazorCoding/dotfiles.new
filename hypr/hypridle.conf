general {
    # Lock screen safely
    lock_cmd = pidof hyprlock || hyprlock
}

# -----------------------------
# Keyboard backlight listener
# -----------------------------
listener {
    timeout = 60
    # Run in background so hypridle can't hang
    on-timeout = bash -c 'brightnessctl -d platform::kbd_backlight set 0 &' 
    on-resume  = bash -c 'brightnessctl -rd platform::kbd_backlight set 1 &' 
}


# -----------------------------
# DPMS + hyprlock safe idle
# -----------------------------
listener {
    timeout = 120
    on-timeout = sh -c 'hyprctl dispatch dpms off'
    on-resume  = sh -c 'hyprctl dispatch dpms on'
}

# -----------------------------
#listener {
#    timeout = 500
#    on-timeout = sh -c 'hyprlock'
#}
# -----------------------------
# Optional: poweroff if on battery
# -----------------------------

listener {
    timeout = 360
on-timeout = bash -c '[ "$(cat /sys/class/power_supply/ACAD/online)" = "0" ] && systemctl poweroff'

}

