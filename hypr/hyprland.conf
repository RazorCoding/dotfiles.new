# This is an example Hyprland config file.
#
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto
#monitor=,preferred,auto,2
#monitor=eDP-1,preferred,auto,1.60

# Use the AMD card for the display, Nvidia as secondary
#env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:05:00.0-card:/dev/dri/by-path/pci-0000:01:00.0-card
#env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1
# Keep these for general compatibility
#env = XDG_CURRENT_DESKTOP,Hyprland
#env = XDG_SESSION_TYPE,wayland
#env = XDG_SESSION_DESKTOP,Hyprland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
#monitor=,2400x1080@60,auto,1
monitor=eDP-1,2560x1600@120.01Hz,0x0,1
#monitor = eDP-1, preferred, auto, 1
#monitor = , preferred, auto, 1
#monitor=,1920x1080@60,auto,1.33
xwayland {
  force_zero_scaling = true
}
#env = LIBVA_DRIVER_NAME,nvidia
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
#env = ELECTRON_OZONE_PLATFORM_HINT,auto  # Reduces Electron app flickering

# Execute your favorite apps at launch
#exec-once = protonvpn-app
#exec-once = discord --start-minimized
exec-once = pgrep -x hypridle || hypridle 
exec-once = pgrep -x waybar || waybar
exec-once = hyprpaper
exec-once = pgrep -x copyq || copyq --start-server 
exec-once = chromium
exec-once = env GDK_SCALE=1 GDK_DPI_SCALE=1.4 __NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia __VK_LAYER_NV_optimus=NVIDIA_only steam
exec-once =  ~/.local/bin/youtube-notify.sh
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &
exec-once = hyprsunset
exec-once = ~/.config/hypr/scripts/wob.sh
#exec-once = $HOME/.config/hypr/scripts/waybar_auto_hide 

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
# Volume and Media Control

$terminal = ghostty
$menu = wofi --show drun -I -m

# Some default env vars.
#env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
#env = SDL_VIDEODRIVER,x11
#env = WLR_DRM_DEVICES,/dev/dri/card1
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us

    follow_mouse = 1

    scroll_factor = 1.0    # FIX for broken scrolling/clicks

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }

    repeat_delay = 300
    repeat_rate = 60
    sensitivity = 0
}
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 6
    border_size = 0
    col.active_border = rgb(fcba03) rgb(fcba03) 45deg
    col.inactive_border = rgba(000000aa)
    layout = dwindle
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 6

    blur {
        enabled = false
        
	size = 8
        passes = 4
        new_optimizations = true
       
        vibrancy = 0.1696
    }
}
# ----------------------------------------------------- 
# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█
#
# name "High"
# credit https://github.com/mylinuxforwork/dotfiles
# ----------------------------------------------------- 

animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 2, wind, slidevert
    animation = windowsIn, 1, 2, winIn, slidevert
    animation = windowsOut, 1, 2, winOut, slidevert
    animation = windowsMove, 1, 2, wind, slide

    animation = border, 1, 1, liner
    animation = borderangle, 1, 20, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 2, wind
} 
dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more=
    preserve_split = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
   
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
     mouse_move_enables_dpms=true
    key_press_enables_dpms=true  
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.
# Steam

windowrule {
  name = steam-ws3
  match:initial_class = ^steam$
  workspace = 3 
}
windowrule {
	name = gamesteam
	match:initial_class = ^steam_app_.*$
	workspace = 3
}
windowrule {
  name = chromium-ws2
  match:class = ^chromium$
  workspace = 2 
}

windowrule{
	name = spotify-ws5
	match:class = ^spotify$	
	workspace = 5 
}

windowrule{
	name = discord-ws6
 	match:class = ^discord$
	workspace = 6 
}


windowrule{
	name = obs
	match:class = ^com.obsproject.Studio$
	workspace = 7 
}

#windowrule = match:class cs2, immediate yes
#windowrule = match:class steam_app_298110, fullscreen yes
#windowrule = match:class steam_app_298110, immediate yes
#windowrule = nofocus, class:^(FarCry4\.exe)$
#windowrule = immediate, class:^(FarCry4\.exe)$
#windowrule = fullscreen, class:^(FarCry4\.exe)$

# noanim isn't necessary but animations with these rules might look bad. use at your own discretion.
#windowrule = immediate, class:^(cs2)$
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, P, exec, bash -c 'grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%s).png'
bind = $mainMod, K, exec, spotify-launcher
bind = $mainMod, E, exec, wofi-emoji
bind = $mainMod, W, exec, killall -9 waybar 2>/dev/null; waybar &
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, L, exec,  hyprlock
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, pkill -TERM hypridle ; sleep 0.1; hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, layoutmsg, togglesplit   # dwindle
bind = $mainMod, X, exec, env GDK_SCALE=1 GDK_DPI_SCALE=1.4 __NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia __VK_LAYER_NV_optimus=NVIDIA_only steam
bind = $mainMod, N, exec, swaync-client -d
#bind = $mainMod, X,exec, env GDK_SCALE=1 GDK_DPI_SCALE=1.4 prime-run steam -noverifyfiles -norepairfiles -offline --force-device-    scale-factor=1.4 
# Go to next orkspace
bind = $mainMod, left, workspace, e-1
bind = $mainMod, right, workspace, e+1
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86MonBrightnessUp, exec, brightnessctl set +5% 
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%- 

bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma +10
bindel = ,XF86MonBrightnessUp, exec, hyprctl hyprsunset gamma -10

bind = , XF86AudioRaiseVolume, exec, pamixer -i 5 && pamixer --get-volume > /tmp/wob.sock
bind = , XF86AudioLowerVolume, exec, pamixer -d 5 && pamixer --get-volume > /tmp/wob.sock
bind = , XF86AudioMute, exec, pamixer -t && echo 0 > /tmp/wob.sock
# --- Resize active uindow ---
# Shrink/expand width
bind = $mainMod, Left, resizeactive, -50 0
bind = $mainMod, Right, resizeactive, 50 0

# Shrink/expand height
bind = $mainMod, Down, resizeactive, 0 -50
bind = $mainMod, Up, resizeactive, 0 50

